name: Site

on:
  push:
    branches: [master]
    paths: [web/**, src/**, pyproject.toml, uv.lock, recordings/**, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: federicocarboni/setup-ffmpeg@37062fbf7149fc5578d6c57e08aed62458b375d6 # v3.1
        env: { FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true }
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with: { enable-cache: true, cache-python: true, activate-environment: true }

      - run: uv sync --frozen
      - name: Build site
        run: |
          set -o pipefail
          set +e
          uv run engine-rattle-splitter site 2>&1 | tee site-build.log
          status=${PIPESTATUS[0]}
          set -e

          {
            cat <<'SUMMARY'
          ## Site build output

          ```text
          SUMMARY
            cat site-build.log
            cat <<'SUMMARY'
          ```
          SUMMARY
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$status"

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with: { path: artifacts/site }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.deployment.outputs.page_url }}" }
    steps: [{ id: deployment, uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 }] # v5.0.0
