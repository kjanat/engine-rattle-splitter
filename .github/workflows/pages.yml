name: deploy pages

on:
  push:
    branches: [master]
    paths:
      - "index.html"
      - "*.mp3"
      - "*.m4a"
      - "*.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: stage site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp *.mp3 *.m4a *.png _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
