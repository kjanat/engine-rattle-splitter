name: deploy pages

on:
  push:
    branches: [master]
    paths:
      - "index.html"
      - "main.py"
      - "engine_sound_splitter/**"
      - "pyproject.toml"
      - "uv.lock"
      - "*.m4a"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: sync deps
        run: uv sync --frozen

      - name: regenerate stems + plots
        run: |
          mkdir -p _site
          uv run python main.py separate     -o _site
          uv run python main.py spectrogram  -o _site/spectrogram.png
          uv run python main.py analyze      -o _site/analysis.png
          uv run python main.py analyze _site/rattles.wav -o _site/rattles_analysis.png
          cp index.html _site/
          cp "Shitty motor (goede recording).m4a" _site/
          rm -f _site/engine.wav _site/rattles.wav

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
